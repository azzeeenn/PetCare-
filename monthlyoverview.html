<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monthly Overview</title>
    <link rel="stylesheet" href="css/monthlyoverview.css">
    <link rel="shortcut icon" href="http://localhost/PetCareProject/favicon.ico" type="image/x-icon">

</head>
<body>

    <h1>Monthly Overview</h1>
    <select id="month-select">
        <option value="1">January</option>
        <option value="2">February</option>
        <option value="3">March</option>
        <option value="4">April</option>
        <option value="5">May</option>
        <option value="6">June</option>
        <option value="7">July</option>
        <option value="8">August</option>
        <option value="9">September</option>
        <option value="10">October</option>
        <option value="11">November</option>
        <option value="12">December</option>
    </select>

    <div class="container" id="calendar-container">
        <!-- Days will be populated dynamically based on the selected month -->
    </div>

    <script src="js/monthlyoverview.js"></script>

</body>
</html>
