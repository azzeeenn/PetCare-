<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rescue a Pet</title>
    <link href="https://fonts.googleapis.com/css2?family=Garamond&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="rescue.css">
</head>
<body>

    <!-- Hero Section -->
    <div class="hero-section">
        <img src="logo-png-removebg-preview.png" alt="Claws and Paws Logo" style="width: 150px; height: auto;"><br><br>
        <h1><b>Welcome to Claws and Paws</b></h1>
        <p>Your ultimate pet care companion.</p>
    </div>

    <!-- Rescue a Pet Form -->
    <section id="rescue-section">
        <div class="container">
            <p>Help us rescue a pet in need. Provide details below to send a rescue request.</p>
            <!-- Form container with reduced width -->
            <div class="form-container">
                <form id="rescue-form" action="rescue.php" method="POST" enctype="multipart/form-data">
                    
                    <!-- Location Input -->
                    <div class="form-group">
                        <label for="location">Location</label>
                        <input type="text" class="form-control" id="location" name="location" placeholder="Enter the location of the pet" required>
                    </div>

                    <!-- Pet Type Dropdown -->
                    <div class="form-group">
                        <label for="pet-type">Pet Type</label>
                        <select class="form-control" id="pet-type" name="pet-type" required>
                            <option value="">Select a pet type</option>
                            <option value="dog">Dog</option>
                            <option value="cat">Cat</option>
                            <option value="other">Other</option>
                        </select>
                    </div>

                    <!-- Pet Condition Textarea -->
                    <div class="form-group">
                        <label for="pet-condition">Pet Condition</label>
                        <textarea class="form-control" id="pet-condition" name="pet-condition" placeholder="Describe the pet's condition (minimum 20 words)" required></textarea>
                    </div>

                    <!-- Contact Name Input -->
                    <div class="form-group">
                        <label for="contact-name">Your Name</label>
                        <input type="text" class="form-control" id="contact-name" name="contact-name" placeholder="Enter your name" required>
                    </div>

                    <!-- Contact Number Input -->
                    <div class="form-group">
                        <label for="contact-number">Phone Number</label>
                        <input type="tel" class="form-control" id="contact-number" name="contact-phone" placeholder="Enter a 10-digit phone number" pattern="[0-9]{10}" required>
                    </div>

                    <!-- Email Input -->
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" class="form-control" id="email" name="contact-email" placeholder="Enter your email address" required>
                    </div>

                    <!-- Additional Notes Textarea -->
                    <div class="form-group">
                        <label for="additional-notes">Additional Notes</label>
                        <textarea class="form-control" id="additional-notes" name="additional-notes" placeholder="Provide any other important details (minimum 50 words)"></textarea>
                    </div>

                    <!-- Urgency Dropdown -->
                    <div class="form-group">
                        <label for="urgency">Urgency</label>
                        <select class="form-control" id="urgency" name="urgency" required>
                            <option value="">Select urgency level</option>
                            <option value="low">Low</option>
                            <option value="medium">Medium</option>
                            <option value="high">High</option>
                        </select>
                    </div>

                    <!-- Pet Image Input -->
                    <div class="form-group">
                        <label for="pet-image">Pet Image</label>
                        <input type="file" class="form-control" id="pet-image" name="pet-image" accept="image/*" required>
                    </div>

                    <!-- Submit Button -->
                    <button type="submit" class="btn btn-primary">Submit</button>
                </form>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer>
        <p>&copy; 2024 Claws and Paws. All rights reserved.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
