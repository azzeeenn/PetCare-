<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="shortcut icon" href="http://localhost/PetCareProject/favicon.ico" type="image/x-icon">

  <title>Sign Up / Login</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      align-items: center;
      height: 100vh;
      background: linear-gradient(to right, #FBE9D0, #90AEAD);
      font-family: 'Garamond', serif;
      color: #244855;
    }

    .logo {
      margin-top: 20px;
      text-align: center;
    }

    .logo img {
      width: 150px;
      height: auto;
    }

    .container {
      text-align: center;
      padding: 2rem;
      border: 2px solid #244855;
      border-radius: 10px;
      background-color: #FBE9D0;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
      margin-top: 5rem;
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 1.5rem;
    }

    .button {
      display: inline-block;
      padding: 10px 20px;
      font-size: 1rem;
      color: #FBE9D0;
      background-color: #244855;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      text-decoration: none;
      transition: background-color 0.3s;
    }

    .button:hover {
      background-color: #E64833;
    }
  </style>
</head>

<body>
  <div class="logo">
    <img src="images/logo-png-removebg-preview.png" alt="Claws and Paws Logo">
  </div>
  <div class="container">
    <h1>Sign Up / Login with your Pet Profile to Continue</h1>
    <a href="loginsignup.html" class="button">Proceed</a>
  </div>
</body>

</html>
